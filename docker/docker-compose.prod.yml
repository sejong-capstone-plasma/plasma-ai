services:
  ai-app:
    ports:
      - "8001:8000"
    environment:
      APP_ENV: prod
    env_file:
      - ../.env.prod
    depends_on:
      ai-vllm:
        condition: service_healthy

  ai-vllm:
    build:
      context: ..
      dockerfile: docker/vllm/Dockerfile
    container_name: ai-vllm
    env_file:
      - ../.env.prod
    volumes:
      - /data/models:/models:ro
    command: >
      /bin/sh -c "vllm serve $$LLM_MODEL_PATH
      --host 0.0.0.0
      --port 8000
      --api-key $$LLM_API_KEY
      --served-model-name $$LLM_MODEL"
    ipc: host
    gpus: all
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models')\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped